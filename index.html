<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>JS Gestão | App</title>

<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JS Gestão">

<link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=JS&background=0f172a&color=3b82f6&size=512&rounded=true&length=2&bold=true&font-size=0.45">
<link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=JS&background=0f172a&color=3b82f6&size=512&rounded=true&length=2&bold=true&font-size=0.45">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ================= CSS (VISUAL) ================= */
:root {
    --bg-body: #0f172a;        
    --bg-sidebar: #111827;    
    --surface: #1e293b;        
    --border: #334155;        
    --text-main: #f8fafc;     
    --text-secondary: #94a3b8; 
    --primary: #3b82f6;        
    --accent-purple: #8b5cf6; 
    --accent-green: #10b981;  
    --accent-pink: #ec4899;   
    --danger: #ef4444;        
    --deposit: #0ea5e9;
    --radius: 12px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    --transition: all 0.3s ease;
}
* { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; overscroll-behavior-y: none; }
.app-wrapper { display: flex; width: 100%; }
aside { width: 250px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
.brand { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
.brand span { color: var(--primary); } 
.nav-menu { display: flex; flex-direction: column; gap: 10px; }
.nav-btn { background: transparent; border: none; padding: 12px 15px; border-radius: var(--radius); color: var(--text-secondary); font-weight: 500; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: var(--transition); }
.nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
.nav-btn.active { background: linear-gradient(90deg, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 100%); color: var(--primary); border-left: 3px solid var(--primary); }
.nav-btn i { width: 20px; text-align: center; }
main { flex: 1; margin-left: 250px; padding: 30px; overflow-y: auto; padding-bottom: 100px; }
@media (max-width: 768px) {
    aside { display: none; } 
    main { margin-left: 0; padding: 15px; padding-bottom: 90px; }
    .mobile-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-sidebar); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .mobile-btn { background: transparent; border: none; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; }
    .mobile-btn.active { color: var(--primary); }
    .mobile-btn i { font-size: 1.2rem; }
}
@media (min-width: 769px) { .mobile-nav { display: none; } }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.page-title { font-size: 1.5rem; font-weight: 700; }
.date-display { font-size: 0.9rem; color: var(--text-secondary); background: var(--surface); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); }
.card { background: var(--surface); border-radius: var(--radius); padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
input, select, textarea { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 0.9rem; transition: var(--transition); font-family: 'Inter', sans-serif;}
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
textarea { resize: vertical; min-height: 80px; }
.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 0.95rem; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--accent-green); color: white; }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.btn-secondary { background: var(--border); color: var(--text-main); }
.dash-filters { display: flex; background: var(--surface); padding: 5px; border-radius: 12px; width: fit-content; margin-bottom: 20px; border: 1px solid var(--border); overflow-x: auto; max-width: 100%; }
.df-btn { background: transparent; border: none; color: var(--text-secondary); padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap; }
.df-btn.active { background: var(--primary); color: white; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-widget { display: flex; align-items: center; gap: 20px; }
.icon-box { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.bg-purple { background: linear-gradient(135deg, #a855f7, #7e22ce); }
.bg-green { background: linear-gradient(135deg, #10b981, #059669); }
.bg-pink { background: linear-gradient(135deg, #ec4899, #db2777); }
.stat-info h3 { margin: 0; font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }
.stat-info p { margin: 5px 0 0 0; font-size: 1.6rem; font-weight: 700; color: var(--text-main); }
.transaction-list { list-style: none; padding: 0; margin: 0; }
.transaction-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; transition: 0.2s; }
.transaction-item:hover { background: rgba(255,255,255,0.05); }
.t-entrada { border-left-color: var(--accent-green); }
.t-saida { border-left-color: var(--danger); }
.t-deposito { border-left-color: var(--deposit); }
.filter-wrapper { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; position: relative; }
.search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
.search-box input { padding-left: 40px; }
.hidden { display: none; }
.active-section { display: block; animation: fadeUp 0.4s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.toast { position: fixed; top: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 8px; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; }
.text-green { color: var(--accent-green); }
.text-red { color: var(--danger); }
.text-blue { color: var(--deposit); }
.split-box { background: rgba(59,130,246,0.1); border: 1px dashed var(--primary); padding: 15px; border-radius: 8px; margin-top: 10px; }
.uppercase-input { text-transform: uppercase; }
</style>
</head>
<body>

<datalist id="listaNomes"></datalist>
<datalist id="listaContratos"></datalist>

<div class="app-wrapper">
    <aside>
        <div class="brand">
            <i class="fas fa-chart-line"></i> JS<span>GESTÃO</span>
        </div>
        <nav class="nav-menu">
            <button onclick="navegar('dashboard')" id="btn-dash" class="nav-btn active"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button onclick="navegar('pagamentos')" id="btn-pag" class="nav-btn"><i class="fas fa-money-bill-wave"></i> Receber <span style="font-size: 0.7rem; color: #475569; margin-left: 5px;">[F2]</span></button>
            <button onclick="navegar('despesas')" id="btn-desp" class="nav-btn"><i class="fas fa-wallet"></i> Pagar</button>
            <button onclick="navegar('config')" id="btn-conf" class="nav-btn"><i class="fas fa-cogs"></i> Configurações</button>
        </nav>
    </aside>

    <main>
        <div class="header-top">
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="date-display" id="dataAtual"></div>
        </div>

        <section id="dashboard" class="active-section">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div class="dash-filters">
                    <button class="df-btn active" onclick="setDashFilter('dia')" id="d-btn-dia">Hoje</button>
                    <button class="df-btn" onclick="setDashFilter('semana')" id="d-btn-semana">Semana</button>
                    <button class="df-btn" onclick="setDashFilter('mes')" id="d-btn-mes">Mês</button>
                    <button class="df-btn" onclick="setDashFilter('ano')" id="d-btn-ano">Ano</button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="card stat-widget">
                    <div class="icon-box bg-green"><i class="fas fa-arrow-up"></i></div>
                    <div class="stat-info">
                        <h3>Entradas (<span id="lblPeriodo">Hoje</span>)</h3>
                        <p id="dashEntradas" class="text-green">R$ 0,00</p>
                    </div>
                </div>
                <div class="card stat-widget">
                    <div class="icon-box bg-purple"><i class="fas fa-arrow-down"></i></div>
                    <div class="stat-info">
                        <h3>Saídas (<span id="lblPeriodo2">Hoje</span>)</h3>
                        <p id="dashSaidas" class="text-red">R$ 0,00</p>
                    </div>
                </div>
                <div class="card stat-widget">
                    <div class="icon-box bg-pink"><i class="fas fa-wallet"></i></div>
                    <div class="stat-info">
                        <h3>Saldo Líquido</h3>
                        <p id="dashSaldo">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="card">
                    <h3 style="margin-top:0"><i class="fas fa-chart-bar"></i> Visão Geral</h3>
                    <div style="height: 250px;"><canvas id="financeChart"></canvas></div>
                </div>
                <div class="card">
                    <h3 style="margin-top:0"><i class="fas fa-list"></i> Detalhes por Método</h3>
                    <div id="detalhesMetodos" style="margin-top:15px"></div>
                </div>
            </div>
        </section>

        <section id="pagamentos" class="hidden">
            <div class="card">
                <h3 style="margin-top:0"><i class="fas fa-plus"></i> Novo Recebimento</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="grid-column: span 2;">
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Cliente</label>
                        <input id="nomeCliente" class="uppercase-input" list="listaNomes" placeholder="NOME DO CLIENTE" oninput="this.value = this.value.toUpperCase(); autoPreencher('nome')" onkeyup="checkEnter(event, salvarPagamento)" autocomplete="off" />
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Contrato</label>
                        <input id="contrato" class="uppercase-input" list="listaContratos" placeholder="Nº CONTRATO" oninput="this.value = this.value.toUpperCase(); autoPreencher('contrato')" onkeyup="checkEnter(event, salvarPagamento)" autocomplete="off" />
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Referência</label>
                        <input id="referencia" class="uppercase-input" placeholder="EX: MAI/2026" oninput="this.value = this.value.toUpperCase()" onkeyup="checkEnter(event, salvarPagamento)" />
                    </div>
                    <div style="grid-column: span 2;">
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Valor (R$)</label>
                        <input id="valorPago" type="number" step="0.01" placeholder="0.00" onkeyup="checkEnter(event, salvarPagamento)" />
                    </div>
                    <div style="grid-column: span 2;">
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Método</label>
                        <select id="metodo" onkeyup="checkEnter(event, salvarPagamento)">
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Pix">Pix</option>
                            <option value="Crédito">Crédito</option>
                            <option value="Débito">Débito</option>
                        </select>
                    </div>
                    <div style="grid-column: span 2;">
                         <div onclick="toggleMisto()" style="cursor:pointer; color:var(--primary); font-size:0.9rem; margin-bottom:10px;">
                            <i class="far fa-square" id="iconMisto"></i> Pagamento Misto?
                        </div>
                        <div id="boxMisto" class="split-box hidden">
                            <input id="valorPago2" type="number" placeholder="Valor 2 (R$)" style="margin-bottom:10px;" onkeyup="checkEnter(event, salvarPagamento)" />
                            <select id="metodo2" onkeyup="checkEnter(event, salvarPagamento)">
                                <option value="Pix">Pix</option>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Crédito">Crédito</option>
                                <option value="Débito">Débito</option>
                            </select>
                        </div>
                    </div>
                    <div style="grid-column: span 2; margin-top: 10px;">
                        <input type="hidden" id="idEmEdicao">
                        <button id="btnSalvar" class="btn btn-primary" onclick="salvarPagamento()">Confirmar Entrada</button>
                        <button id="btnCancelarEdit" class="btn btn-secondary hidden" onclick="cancelarEdicao()" style="margin-top:10px">Cancelar</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0">Histórico de Recebimentos</h3>
                </div>
                
                <div class="filter-wrapper">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="buscaPagamentos" placeholder="Buscar cliente ou contrato..." onkeyup="renderizarListas()">
                    </div>
                    <div style="flex-basis: 150px;">
                        <input type="date" id="filtroDataLista" onchange="renderizarListas()" title="Filtrar por data específica">
                    </div>
                    <button class="btn btn-secondary" onclick="limparFiltroData()" style="width:auto; padding:0 15px;" title="Limpar Filtro"><i class="fas fa-eraser"></i></button>
                    
                    <button class="btn btn-success" onclick="exportarWhatsApp()" style="width:auto; padding:0 15px;" title="Exportar Relatório do dia selecionado">
                        <i class="fab fa-whatsapp"></i> Exportar Caixa
                    </button>
                </div>

                <ul id="listaPagamentos" class="transaction-list"></ul>
            </div>
        </section>

        <section id="despesas" class="hidden">
            <div class="card">
                <h3 style="margin-top:0"><i class="fas fa-minus"></i> Nova Saída</h3>
                <div style="display: grid; gap: 15px;">
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Tipo de Saída</label>
                        <select id="tipoSaida" onkeyup="checkEnter(event, salvarDespesa)">
                            <option value="Sangria / Despesa">Sangria / Despesa</option>
                            <option value="Depósito">Depósito Bancário</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Descrição</label>
                        <input id="descDespesa" class="uppercase-input" placeholder="DESCRIÇÃO DA RETIRADA" oninput="this.value = this.value.toUpperCase()" onkeyup="checkEnter(event, salvarDespesa)" />
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary)">Valor (R$)</label>
                        <input id="valorDespesa" type="number" step="0.01" placeholder="0.00" onkeyup="checkEnter(event, salvarDespesa)" />
                    </div>
                    
                    <button class="btn btn-danger" onclick="salvarDespesa()">Registrar Saída</button>
                </div>
            </div>
            <div class="card">
                <h3>Últimas Saídas</h3>
                <ul id="listaDespesas" class="transaction-list"></ul>
            </div>
        </section>

        <section id="config" class="hidden">
            <div class="card">
                <h3>Dados & Backup</h3>
                <button class="btn btn-primary" onclick="baixarBackup()" style="margin-bottom:15px; background:var(--accent-green)">
                    <i class="fas fa-download"></i> Baixar Backup (JSON)
                </button>
                <div style="position:relative; margin-bottom:15px;">
                    <button class="btn btn-secondary" onclick="document.getElementById('inputRestore').click()">
                        <i class="fas fa-upload"></i> Restaurar Backup
                    </button>
                    <input type="file" id="inputRestore" accept=".json" class="hidden" onchange="restaurarBackup(this)">
                </div>
                <button class="btn btn-danger" onclick="limparDados()">
                    <i class="fas fa-trash"></i> Resetar Tudo
                </button>
            </div>
        </section>
    </main>
</div>

<nav class="mobile-nav">
    <button onclick="navegar('dashboard')" class="mobile-btn active" id="mob-dashboard"><i class="fas fa-chart-pie"></i>Dash</button>
    <button onclick="navegar('pagamentos')" class="mobile-btn" id="mob-pagamentos"><i class="fas fa-arrow-up"></i>Receber</button>
    <button onclick="navegar('despesas')" class="mobile-btn" id="mob-despesas"><i class="fas fa-arrow-down"></i>Pagar</button>
    <button onclick="navegar('config')" class="mobile-btn" id="mob-config"><i class="fas fa-cog"></i>Config</button>
</nav>

<div id="toast-container"></div>

<script>
// --- CORE LOGIC ---
let pagamentos = JSON.parse(localStorage.getItem('pg') || '[]');
let despesas = JSON.parse(localStorage.getItem('dp') || '[]');
let clientesDB = [];
let chartInstance = null;
let modoMisto = false;
let dashFilter = 'dia'; 

// Identificar Mês e Ano atual para Referência Automática
function getMesAtual() {
    const meses = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];
    const d = new Date();
    return meses[d.getMonth()] + '/' + d.getFullYear();
}

// Data Inicial para o Header e Filtro Fixo Hoje
const hoje = new Date();
const anoHj = hoje.getFullYear();
const mesHj = String(hoje.getMonth() + 1).padStart(2, '0');
const diaHj = String(hoje.getDate()).padStart(2, '0');
document.getElementById('filtroDataLista').value = `${anoHj}-${mesHj}-${diaHj}`;

document.getElementById('dataAtual').innerText = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

// Inicia com Referência preenchida
document.getElementById('referencia').value = getMesAtual();

migrarDados();
atualizarBaseClientes();
navegar('dashboard');

// ATALHOS GLOBAIS DE TECLADO
document.addEventListener('keydown', function(e) {
    if (e.key === 'F2') {
        e.preventDefault(); 
        navegar('pagamentos');
        document.getElementById('nomeCliente').focus();
    } else if (e.key === 'Escape') {
        cancelarEdicao();
        document.getElementById('descDespesa').value = ''; 
        document.getElementById('valorDespesa').value = '';
    }
});

// Captura do Enter
function checkEnter(event, callback) {
    if(event.key === 'Enter') {
        callback();
    }
}

// Base de Clientes para Autocomplete
function atualizarBaseClientes() {
    clientesDB = [];
    pagamentos.forEach(p => {
        if(p.nome && !clientesDB.find(c => c.nome === p.nome && c.contrato === p.contrato)) {
            clientesDB.push({ nome: p.nome, contrato: p.contrato || '' });
        }
    });
    
    const dlNomes = document.getElementById('listaNomes');
    const dlContratos = document.getElementById('listaContratos');
    
    dlNomes.innerHTML = [...new Set(clientesDB.map(c => c.nome))].map(n => `<option value="${n}">`).join('');
    dlContratos.innerHTML = [...new Set(clientesDB.map(c => c.contrato).filter(c=>c))].map(c => `<option value="${c}">`).join('');
}

function autoPreencher(origem) {
    const nomeInp = document.getElementById('nomeCliente');
    const contInp = document.getElementById('contrato');
    
    if (origem === 'nome' && nomeInp.value) {
        const cliente = clientesDB.find(c => c.nome === nomeInp.value);
        if (cliente && cliente.contrato && !contInp.value) {
            contInp.value = cliente.contrato;
        }
    } else if (origem === 'contrato' && contInp.value) {
        const cliente = clientesDB.find(c => c.contrato === contInp.value);
        if (cliente && cliente.nome && !nomeInp.value) {
            nomeInp.value = cliente.nome;
        }
    }
}

// Impressão de Recibo Térmico - ALINHAMENTO E MARGEM (80mm) CORRIGIDO
function imprimirRecibo(id) {
    const p = pagamentos.find(x => x.id == id);
    if(!p) return;
    
    const printWindow = window.open('', '_blank', 'width=350,height=600');
    
    const html = `
    <html>
    <head>
        <title>Recibo - ${p.nome}</title>
        <style>
            @page { margin: 0; size: 80mm auto; }
            body { 
                font-family: 'Courier New', Courier, monospace; 
                width: 72mm; 
                margin: 0; 
                padding: 4mm 4mm;
                font-size: 14px; 
                color: #000 !important; 
                line-height: 1.5;
            }
            .center { text-align: center; }
            .bold { font-weight: bold; }
            .title { font-size: 20px; letter-spacing: 1px; margin-bottom: 5px; }
            .subtitle { font-size: 14px; margin-bottom: 10px; }
            .dashed-line { border-top: 1.5px dashed #000; margin: 10px 0; }
            .solid-line { border-top: 1.5px solid #000; margin: 10px 0; }
            .row { text-align: left; margin-bottom: 6px; }
            .label { font-weight: bold; }
            .value { text-transform: uppercase; }
            .stamp-space { height: 20mm; } 
        </style>
    </head>
    <body>
        <div class="center bold title">IBANET FIBRA</div>

function navegar(sec) {
    document.querySelectorAll('section').forEach(s => { s.classList.add('hidden'); s.classList.remove('active-section'); });
    const target = document.getElementById(sec);
    target.classList.remove('hidden'); target.classList.add('active-section');
    const titulos = {'dashboard': 'Dashboard', 'pagamentos': 'Contas a Receber', 'despesas': 'Saídas e Sangrias', 'config': 'Configurações'};
    document.getElementById('pageTitle').innerText = titulos[sec];
    document.querySelectorAll('.nav-btn, .mobile-btn').forEach(b => b.classList.remove('active'));
    const deskBtn = document.getElementById('btn-' + (sec === 'pagamentos' ? 'pag' : sec === 'despesas' ? 'desp' : sec === 'config' ? 'conf' : 'dash'));
    const mobBtn = document.getElementById('mob-' + sec);
    if(deskBtn) deskBtn.classList.add('active');
    if(mobBtn) mobBtn.classList.add('active');
    if(sec === 'dashboard') atualizarDashboard();
    if(sec === 'pagamentos' || sec === 'despesas') renderizarListas();
}
function migrarDados() {
    let changed = false;
    pagamentos.forEach((p, i) => { if(!p.id) { p.id = Date.now() + i; changed = true; } });
    despesas.forEach((d, i) => { if(!d.id) { d.id = Date.now() + i; changed = true; } });
    if(changed) save();
}
function save() {
    localStorage.setItem('pg', JSON.stringify(pagamentos));
    localStorage.setItem('dp', JSON.stringify(despesas));
}

function toggleMisto() {
    modoMisto = !modoMisto;
    const box = document.getElementById('boxMisto');
    const icon = document.getElementById('iconMisto');
    if(modoMisto) { box.classList.remove('hidden'); icon.className = "far fa-check-square"; } 
    else { box.classList.add('hidden'); icon.className = "far fa-square"; document.getElementById('valorPago2').value = ''; }
}
function salvarPagamento() {
    const idEdit = document.getElementById('idEmEdicao').value;
    const nome = document.getElementById('nomeCliente').value.toUpperCase();
    const contrato = document.getElementById('contrato').value.toUpperCase();
    const ref = document.getElementById('referencia').value.toUpperCase();
    const v1 = parseFloat(document.getElementById('valorPago').value);
    const m1 = document.getElementById('metodo').value;
    
    if(!nome || isNaN(v1)) return showToast("Preencha Nome e Valor!", "error");
    if(idEdit) {
        const idx = pagamentos.findIndex(p => p.id == idEdit);
        if(idx > -1) {
            pagamentos[idx].nome = nome; pagamentos[idx].contrato = contrato; pagamentos[idx].ref = ref; pagamentos[idx].valor = v1; pagamentos[idx].metodo = m1;
            showToast("Atualizado!"); cancelarEdicao();
        }
    } else {
        const agora = new Date();
        pagamentos.unshift({ id: Date.now(), nome, contrato, valor: v1, metodo: m1, ref, data: agora.toLocaleString('pt-BR'), ts: agora.getTime() });
        if(modoMisto) {
            const v2 = parseFloat(document.getElementById('valorPago2').value);
            const m2 = document.getElementById('metodo2').value;
            if(!isNaN(v2) && v2 > 0) {
                pagamentos.unshift({ id: Date.now()+1, nome: nome+" (PARCIAL)", contrato, valor: v2, metodo: m2, ref, data: agora.toLocaleString('pt-BR'), ts: agora.getTime() });
            }
        }
        showToast("Recebido!");
    }
    save(); 
    atualizarBaseClientes();
    limparFormPag(); 
    renderizarListas();
    document.getElementById('nomeCliente').focus();
}
function salvarDespesa() {
    const tipo = document.getElementById('tipoSaida').value;
    const desc = document.getElementById('descDespesa').value.toUpperCase();
    const val = parseFloat(document.getElementById('valorDespesa').value);
    if(!desc || isNaN(val)) return showToast("Preencha tudo!", "error");
    const agora = new Date();
    despesas.unshift({ id: Date.now(), tipo: tipo, descricao: desc, valor: val, data: agora.toLocaleString('pt-BR'), ts: agora.getTime() });
    save(); 
    showToast(tipo + " registrada!", "success");
    document.getElementById('descDespesa').value = ''; document.getElementById('valorDespesa').value = ''; renderizarListas();
    document.getElementById('descDespesa').focus();
}
function editarPagamento(id) {
    const p = pagamentos.find(x => x.id == id);
    if(!p) return;
    document.getElementById('nomeCliente').value = p.nome; 
    document.getElementById('contrato').value = p.contrato || '';
    document.getElementById('referencia').value = p.ref || '';
    document.getElementById('valorPago').value = p.valor; 
    document.getElementById('metodo').value = p.metodo;
    document.getElementById('idEmEdicao').value = p.id;
    document.getElementById('btnSalvar').innerText = "Atualizar"; document.getElementById('btnCancelarEdit').classList.remove('hidden');
    window.scrollTo({top:0, behavior:'smooth'});
}
function cancelarEdicao() {
    limparFormPag(); document.getElementById('idEmEdicao').value = '';
    document.getElementById('btnSalvar').innerText = "Confirmar Entrada"; document.getElementById('btnCancelarEdit').classList.add('hidden');
}
function limparFormPag() {
    document.getElementById('nomeCliente').value = ''; 
    document.getElementById('contrato').value = ''; 
    document.getElementById('referencia').value = getMesAtual(); // Referencia automática
    document.getElementById('valorPago').value = '';
    if(modoMisto) toggleMisto();
}
function deletar(type, id) {
    if(!confirm("Tem certeza que deseja apagar?")) return;
    if(type === 'pg') pagamentos = pagamentos.filter(p => p.id != id); else despesas = despesas.filter(d => d.id != id);
    save(); atualizarBaseClientes(); renderizarListas(); atualizarDashboard();
}
function limparFiltroData() { document.getElementById('filtroDataLista').value = ''; renderizarListas(); }
function renderizarListas() {
    const termo = document.getElementById('buscaPagamentos').value.toLowerCase();
    const dataFiltroInput = document.getElementById('filtroDataLista').value; 
    let listaPg = pagamentos;
    if(dataFiltroInput) {
        const partes = dataFiltroInput.split('-');
        const inicioDia = new Date(partes[0], partes[1]-1, partes[2], 0, 0, 0).getTime();
        const fimDia = new Date(partes[0], partes[1]-1, partes[2], 23, 59, 59).getTime();
        listaPg = listaPg.filter(p => { if(!p.ts) return false; return p.ts >= inicioDia && p.ts <= fimDia; });
    }
    listaPg = listaPg.filter(p => p.nome.toLowerCase().includes(termo) || (p.contrato && p.contrato.toLowerCase().includes(termo)));
    const ulPg = document.getElementById('listaPagamentos');
    
    ulPg.innerHTML = listaPg.length ? listaPg.map(p => `
        <li class="transaction-item t-entrada">
            <div style="flex:1">
                <strong style="color:var(--text-main)">${p.nome}</strong> 
                <span style="font-size:0.8rem; color:var(--text-secondary); margin-left:5px">(${p.metodo})</span><br>
                <small style="color:var(--text-secondary)">${p.data} ${p.contrato ? '• CT: '+p.contrato : ''} ${p.ref ? '• '+p.ref : ''}</small>
            </div>
            <div style="text-align:right">
                <span style="color:var(--accent-green); font-weight:700;">+ ${p.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
                <div style="margin-top:5px; display:flex; gap:12px; justify-content:flex-end;">
                    <i class="fas fa-print" onclick="imprimirRecibo(${p.id})" style="cursor:pointer; color:var(--text-main); font-size:1rem" title="Imprimir Recibo"></i>
                    <i class="fas fa-pen" onclick="editarPagamento(${p.id})" style="cursor:pointer; color:var(--primary); font-size:1rem"></i>
                    <i class="fas fa-trash" onclick="deletar('pg', ${p.id})" style="cursor:pointer; color:var(--danger); font-size:1rem"></i>
                </div>
            </div>
        </li>
    `).join('') : '<li style="text-align:center; padding:20px; color:var(--text-secondary)">Nenhum registro encontrado.</li>';
    
    document.getElementById('listaDespesas').innerHTML = despesas.map(d => {
        const isDep = d.tipo === 'Depósito';
        const colorClass = isDep ? 'text-blue' : 'text-red';
        const borderClass = isDep ? 't-deposito' : 't-saida';
        const icon = isDep ? '<i class="fas fa-university" style="color:var(--deposit); margin-right:5px"></i>' : '';
        return `
        <li class="transaction-item ${borderClass}">
            <div>
                <strong>${icon}${d.descricao}</strong><br>
                <small style="color:var(--text-secondary)">${d.data} • ${d.tipo || 'Sangria'}</small>
            </div>
            <div style="text-align:right">
                <span class="${colorClass}" style="font-weight:700;">- ${d.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
                <i class="fas fa-trash" onclick="deletar('dp', ${d.id})" style="cursor:pointer; color:var(--danger); margin-left:10px;"></i>
            </div>
        </li>`
    }).join('');
}
function setDashFilter(periodo) {
    dashFilter = periodo;
    document.querySelectorAll('.df-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('d-btn-' + periodo).classList.add('active');
    let txt = periodo === 'dia' ? 'Hoje' : periodo === 'semana' ? 'Semana' : periodo === 'mes' ? 'Mês' : 'Ano';
    document.getElementById('lblPeriodo').innerText = txt; document.getElementById('lblPeriodo2').innerText = txt;
    atualizarDashboard();
}
function atualizarDashboard() {
    const agora = new Date();
    let inicio = 0;
    let fim = agora.getTime();

    if(dashFilter === 'dia') {
        inicio = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 0, 0, 0).getTime();
        fim = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 23, 59, 59).getTime();
    }
    else if(dashFilter === 'semana') { const d = new Date(agora); d.setDate(agora.getDate() - agora.getDay()); d.setHours(0,0,0,0); inicio = d.getTime(); }
    else if (dashFilter === 'mes') inicio = new Date(agora.getFullYear(), agora.getMonth(), 1).getTime();
    else if (dashFilter === 'ano') inicio = new Date(agora.getFullYear(), 0, 1).getTime();
    
    const pgFiltro = pagamentos.filter(p => (p.ts || 0) >= inicio && (p.ts || 0) <= fim);
    const dpFiltro = despesas.filter(d => (d.ts || 0) >= inicio && (d.ts || 0) <= fim);
    
    const totalE = pgFiltro.reduce((a,b)=>a+b.valor,0);
    const totalS = dpFiltro.reduce((a,b)=>a+b.valor,0);
    
    document.getElementById('dashEntradas').innerText = totalE.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById('dashSaidas').innerText = totalS.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById('dashSaldo').innerText = (totalE - totalS).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    const metodos = {};
    pgFiltro.forEach(p => { metodos[p.metodo] = (metodos[p.metodo]||0) + p.valor });
    if(chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('financeChart').getContext('2d');
    const labels = Object.keys(metodos);
    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: labels, datasets: [{ data: Object.values(metodos), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#94a3b8' } } } }
    });
    
    document.getElementById('detalhesMetodos').innerHTML = labels.map(k => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); color:var(--text-secondary)">
            <span>${k}</span> <span style="color:var(--text-main); font-weight:600">${metodos[k].toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
        </div>`).join('') || '<div style="text-align:center; color:#64748b; padding:10px">Sem dados no período</div>';
}

function exportarWhatsApp() {
    const dataFiltroInput = document.getElementById('filtroDataLista').value; 
    let inicioDia, fimDia, dataTexto;

    if(dataFiltroInput) {
        const partes = dataFiltroInput.split('-');
        inicioDia = new Date(partes[0], partes[1]-1, partes[2], 0, 0, 0).getTime();
        fimDia = new Date(partes[0], partes[1]-1, partes[2], 23, 59, 59).getTime();
        dataTexto = `${partes[2]}/${partes[1]}/${partes[0]}`;
    } else {
        const agora = new Date();
        inicioDia = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 0, 0, 0).getTime();
        fimDia = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 23, 59, 59).getTime();
        dataTexto = agora.toLocaleDateString('pt-BR');
    }
    
    const pgFiltrados = pagamentos.filter(p => p.ts >= inicioDia && p.ts <= fimDia);
    const dpFiltrados = despesas.filter(d => d.ts >= inicioDia && d.ts <= fimDia);
    
    if(pgFiltrados.length === 0 && dpFiltrados.length === 0) {
        showToast("Não há dados nessa data para exportar.", "error");
        return;
    }

    let relatorio = `*FECHAMENTO DE CAIXA - ${dataTexto}*\n\n`;
    
    let totalDinheiro = 0, totalPix = 0, totalCredito = 0, totalDebito = 0, totalEntradas = 0;
    
    if(pgFiltrados.length > 0) {
        relatorio += `*ENTRADAS:*\n`;
        pgFiltrados.forEach(p => {
            if(p.metodo === 'Dinheiro') totalDinheiro += p.valor;
            else if(p.metodo === 'Pix') totalPix += p.valor;
            else if(p.metodo === 'Crédito') totalCredito += p.valor;
            else if(p.metodo === 'Débito') totalDebito += p.valor;
            
            totalEntradas += p.valor;
            
            const valorFormat = p.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            relatorio += `• *${p.nome.trim()}* (${p.metodo})\n`;
            relatorio += `${p.data} ${p.contrato ? '• CT: ' + p.contrato.trim() : ''} ${p.ref ? '• ' + p.ref.trim() : ''}\n`;
            relatorio += `+ R$ ${valorFormat}\n\n`;
        });
        
        relatorio += `*RESUMO DOS RECEBIMENTOS:*\n`;
        if(totalDinheiro > 0) relatorio += `💵 *Dinheiro:* R$ ${totalDinheiro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n`;
        if(totalPix > 0) relatorio += `📱 *Pix:* R$ ${totalPix.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n`;
        if(totalCredito > 0) relatorio += `💳 *Crédito:* R$ ${totalCredito.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n`;
        if(totalDebito > 0) relatorio += `💳 *Débito:* R$ ${totalDebito.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n`;
        
        relatorio += `\n*TOTAL GERAL:* R$ ${totalEntradas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n\n`;
    }
    
    if(dpFiltrados.length > 0) {
        relatorio += `*SAÍDAS / SANGRIAS:*\n`;
        let totalSaidas = 0;
        dpFiltrados.forEach(d => {
            relatorio += `• *${d.descricao.trim()}* (${d.tipo})\n`;
            relatorio += `- R$ ${d.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n\n`;
            totalSaidas += d.valor;
        });
        relatorio += `*TOTAL SAÍDAS:* R$ ${totalSaidas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n\n`;
        
        const saldoGaveta = totalDinheiro - totalSaidas;
        relatorio += `*SALDO FÍSICO NA GAVETA (Dinheiro - Saídas):* R$ ${saldoGaveta.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n\n`;
    }
    
    const zapLink = 'https://api.whatsapp.com/send?text=' + encodeURIComponent(relatorio);
    window.open(zapLink, '_blank');
}

function baixarBackup() {
    const node = document.createElement('a');
    node.setAttribute("href", "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({pagamentos, despesas})));
    node.setAttribute("download", "backup_jsgestao.json");
    document.body.appendChild(node); node.click(); node.remove();
}
function restaurarBackup(input) {
    const fr = new FileReader();
    fr.onload = (e) => {
        const d = JSON.parse(e.target.result);
        if(d.pagamentos && d.despesas) { pagamentos = d.pagamentos; despesas = d.despesas; migrarDados(); save(); location.reload(); }
    }; fr.readAsText(input.files[0]);
}
function limparDados(){ if(confirm("Apagar tudo?")) { localStorage.clear(); location.reload(); } }
function showToast(msg, type='success') {
    const t = document.createElement('div'); t.className = 'toast';
    t.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--accent-green)'}"></i> ${msg}`;
    document.getElementById('toast-container').appendChild(t); setTimeout(()=>t.remove(), 3000);
}
